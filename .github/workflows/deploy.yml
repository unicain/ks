name: Deploy do Portfolio

on:
  push:
    branches:
      - main # Altere para 'master' se sua branch principal tiver esse nome

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 🔥 Atualizado para o Node 24 (evita o aviso de depreciação)
          # 💡 Removemos a linha do cache temporariamente para evitar o erro de falta de lockfile

      - name: Instalar e Buildar 🚀
        run: |
          npm install
          npm run build

      - name: Deploy no GitHub Pages 📂
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Pasta gerada pelo Vite
          branch: gh-pages # Branch onde o GitHub Pages lerá os arquivos prontos
